name: Dependency Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  checks: write
  contents: read

jobs:
  audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Audit dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # We currently allow advisories which are informational/policy-level (e.g. "unmaintained")
          # or come from upstream dependency chains that we are not ready to refactor.
          # RUSTSEC-2026-0098/RUSTSEC-2026-0099/RUSTSEC-2026-0104 still arrive through
          # solana-storage-bigtable 4.0.0-rc.0 -> tonic 0.9.2 -> rustls 0.21; no newer
          # solana-storage-bigtable release is available yet.
          # RUSTSEC-2026-0097 is inherited from upstream rand 0.8/0.9 dependency chains.
          ignore: RUSTSEC-2024-0375,RUSTSEC-2025-0012,RUSTSEC-2025-0141,RUSTSEC-2024-0388,RUSTSEC-2024-0384,RUSTSEC-2024-0436,RUSTSEC-2025-0134,RUSTSEC-2021-0145,RUSTSEC-2026-0098,RUSTSEC-2026-0099,RUSTSEC-2026-0104,RUSTSEC-2026-0097
