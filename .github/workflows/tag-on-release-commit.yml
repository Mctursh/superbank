name: Tag release commit

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    name: Create v* tag when a release PR is merged
    runs-on: ubuntu-latest
    if: "${{ startsWith(github.event.head_commit.message || '', 'chore(release): v') }}"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Tag and push
        shell: bash
        run: |
          set -euo pipefail

          # Extra guard: only tag commits that actually updated the release-please manifest.
          if ! git show --name-only --pretty='' HEAD | grep -Fxq '.github/.release-please-manifest.json'; then
            echo "No .github/.release-please-manifest.json update in this commit; skipping"
            exit 0
          fi

          # Release-please bumps the workspace version (and keeps members in sync); use it for our tag.
          VERSION="$(python3 - <<'PY'
          import tomllib
          with open("Cargo.toml","rb") as f:
              print(tomllib.load(f)["package"]["version"])
          PY
          )"
          TAG="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Idempotent: if the tag already exists remotely, do nothing.
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists; skipping"
            exit 0
          fi

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
